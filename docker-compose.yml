# Frontend: React + TypeScript (Vite). Backend: NestJS. Base de datos: Supabase (remoto).
# Sin PHP. Todo dockerizado.

services:
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    container_name: smart-economato-frontend
    restart: always
    ports:
      - "8081:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  api:
    build: ./backend
    container_name: smart-economato-api
    restart: always
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    environment:
      - PORT=3000
      - DB_HOST=${DB_HOST:-aws-1-eu-west-1.pooler.supabase.com}
      - DB_PORT=${DB_PORT:-6543}
      - DB_NAME=${DB_NAME:-postgres}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - DB_SSL=${DB_SSL:-true}
      - DB_SSL_REJECT_UNAUTHORIZED=${DB_SSL_REJECT_UNAUTHORIZED:-true}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:8081}
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-key-change-in-production-min-32-chars}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-8h}
