# Frontend: React + TypeScript (Vite). Backend: NestJS. Base de datos: Supabase (remoto).
# Sin PHP. Todo dockerizado.

services:
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    container_name: smart-economato-frontend
    restart: always
    ports:
      - "8081:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  api:
    build: ./backend
    container_name: smart-economato-api
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    environment:
      - PORT=3000
